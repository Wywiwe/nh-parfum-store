backend:
  name: git-gateway
  branch: main

local_backend: true
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "store"
    label: "NH Parfum Store"
    files:
      - name: "content"
        label: "Edit Website"
        file: "data/store.json"
        format: "json"
        fields:
          - label: "Profil Toko"
            name: "profile"
            widget: "object"
            fields:
              - { label: "Nama toko", name: "storeName", widget: "string" }
              - { label: "Logo text / inisial", name: "logoText", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Nomor WhatsApp", name: "waNumber", widget: "string", hint: "Pakai format 62, contoh 6281234567890" }
              - { label: "Deskripsi footer", name: "footerDesc", widget: "text" }
              - { label: "Pesan cepat WhatsApp", name: "quickMessage", widget: "text" }
              - { label: "Label admin", name: "adminLabel", widget: "string", required: false }

          - label: "Hero & Banner"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow kecil", name: "eyebrow", widget: "string" }
              - { label: "Judul besar", name: "title", widget: "text" }
              - { label: "Deskripsi", name: "desc", widget: "text" }
              - { label: "Tombol utama", name: "primaryText", widget: "string" }
              - { label: "Tombol kedua", name: "secondaryText", widget: "string" }
              - label: "Bullet hero"
                name: "bullets"
                widget: "list"
                field: { label: "Teks bullet", name: "item", widget: "string" }
              - { label: "Judul banner", name: "bannerTitle", widget: "string" }
              - { label: "Subtitle banner", name: "bannerSubtitle", widget: "string" }
              - { label: "Pill harga banner", name: "bannerPrice", widget: "string" }
              - label: "Gambar banner"
                name: "bannerImages"
                widget: "list"
                summary: "{{fields.caption}}"
                hint: "Ideal 1600×900 px, rasio 16:9. Website menampilkan gambar utuh, tidak dicrop. Bisa upload lebih dari 1."
                fields:
                  - { label: "Gambar", name: "src", widget: "image" }
                  - { label: "Caption / Alt text", name: "caption", widget: "string", required: false }

          - label: "Section Produk"
            name: "productSection"
            widget: "object"
            fields:
              - { label: "Kicker", name: "kicker", widget: "string" }
              - { label: "Judul", name: "title", widget: "string" }
              - { label: "Deskripsi", name: "desc", widget: "text" }
              - { label: "Chip kanan", name: "chip", widget: "string" }

          - label: "Kartu Kenapa NH"
            name: "trustCards"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Judul", name: "title", widget: "string" }
              - { label: "Isi", name: "text", widget: "text" }

          - label: "Cara Order"
            name: "orderCards"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Judul", name: "title", widget: "string" }
              - { label: "Isi", name: "text", widget: "text" }

          - label: "Produk"
            name: "products"
            widget: "list"
            summary: "{{fields.name}} — {{fields.badge}}"
            fields:
              - { label: "ID unik / slug", name: "id", widget: "string", hint: "Contoh: royal-ice. Jangan sama dengan produk lain." }
              - { label: "Nama produk", name: "name", widget: "string" }
              - { label: "Badge", name: "badge", widget: "string", required: false }
              - { label: "Notes aroma", name: "notes", widget: "string", required: false }
              - { label: "Deskripsi", name: "desc", widget: "text" }
              - { label: "Warna kartu 1", name: "toneA", widget: "string", default: "#91d1d5", hint: "Kode warna HEX, contoh #91d1d5" }
              - { label: "Warna kartu 2", name: "toneB", widget: "string", default: "#184850", hint: "Kode warna HEX, contoh #184850" }
              - label: "Gambar produk"
                name: "images"
                widget: "list"
                summary: "{{fields.caption}}"
                hint: "Ideal 1080×1080 px, rasio 1:1. Website menampilkan gambar utuh, tidak dicrop. Bisa upload lebih dari 1."
                fields:
                  - { label: "Gambar", name: "src", widget: "image" }
                  - { label: "Caption / Alt text", name: "caption", widget: "string", required: false }
              - label: "Harga"
                name: "prices"
                widget: "object"
                fields:
                  - label: "Standar"
                    name: "Standar"
                    widget: "object"
                    fields:
                      - { label: "15ml", name: "15ml", widget: "number", value_type: "int" }
                      - { label: "20ml", name: "20ml", widget: "number", value_type: "int" }
                      - { label: "30ml", name: "30ml", widget: "number", value_type: "int" }
                  - label: "Best"
                    name: "Best"
                    widget: "object"
                    fields:
                      - { label: "15ml", name: "15ml", widget: "number", value_type: "int" }
                      - { label: "20ml", name: "20ml", widget: "number", value_type: "int" }
                      - { label: "30ml", name: "30ml", widget: "number", value_type: "int" }
                  - label: "Premium"
                    name: "Premium"
                    widget: "object"
                    fields:
                      - { label: "15ml", name: "15ml", widget: "number", value_type: "int" }
                      - { label: "20ml", name: "20ml", widget: "number", value_type: "int" }
                      - { label: "30ml", name: "30ml", widget: "number", value_type: "int" }
